        .grid{
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 30px;
        }
        .card{
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card:hover{
            transform: translate(-3px);
        }
        .card-img{
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .card-body{
            padding:15px;
            flex-grow: 1;
            display: flex;

        }
        .price{

        }
        .btn{

            padding: 8px 14px;
            background: #111;
            color: azure;
            text-decoration: none;
            font-size: 10px;

        .footer{
